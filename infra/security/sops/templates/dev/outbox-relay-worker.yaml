# Outbox Relay Worker — Dev Secrets Template
#
# This is a TEMPLATE file. DO NOT commit unencrypted.
# Encrypt with: sops --encrypt <this-file> > infra/security/sops/dev/outbox-relay-worker.enc.yaml
#
# Edit encrypted version with: just sops-edit outbox-relay-worker dev

apiVersion: v1
kind: Secret
metadata:
  name: outbox-relay-worker-secrets
  namespace: app-dev
  labels:
    app.kubernetes.io/name: outbox-relay-worker
    app.kubernetes.io/env: dev
type: Opaque
stringData:
  # ── Worker ─────────────────────────────────────────────────
  OUTBOX_RUST_LOG: "debug,outbox_relay_worker=trace"

  # ── Database (same Turso instance as counter-service) ─────
  OUTBOX_DATABASE_URL: "file:/data/web-bff.db"

  # ── NATS (Event Bus for publishing) ───────────────────────
  OUTBOX_NATS_URL: "nats://nats-dev:4222"
  OUTBOX_NATS_SUBJECT_PREFIX: "counter"

  # ── Outbox Relay Config ───────────────────────────────────
  OUTBOX_POLL_INTERVAL_MS: "500"
  OUTBOX_BATCH_SIZE: "100"

  # ── Checkpoint (persisted state) ──────────────────────────
  OUTBOX_CHECKPOINT_PATH: "/data/outbox-relay-checkpoint.json"

  # ── Health Check Server ───────────────────────────────────
  OUTBOX_HEALTH_HOST: "0.0.0.0"
  OUTBOX_HEALTH_PORT: "3030"
