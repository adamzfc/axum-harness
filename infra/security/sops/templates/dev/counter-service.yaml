# Counter Service — Dev Secrets Template
#
# This is a TEMPLATE file. DO NOT commit unencrypted.
# Encrypt with: sops --encrypt <this-file> > infra/security/sops/dev/counter-service.enc.yaml
#
# Note: In Phase 0, counter-service is embedded within web-bff.
# This template prepares for Phase 1+ when counter-service becomes a separate deployable.
#
# Edit encrypted version with: just sops-edit counter-service dev

apiVersion: v1
kind: Secret
metadata:
  name: counter-service-secrets
  namespace: app-dev
  labels:
    app.kubernetes.io/name: counter-service
    app.kubernetes.io/env: dev
type: Opaque
stringData:
  # ── Service ────────────────────────────────────────────────
  COUNTER_RUST_LOG: "debug,counter_service=trace"

  # ── Database (Embedded Turso for Phase 0) ─────────────────
  COUNTER_DATABASE_URL: "file:/data/web-bff.db"

  # ── Turso Remote (optional, for Phase 1+) ─────────────────
  # COUNTER_TURSO_URL: ""
  # COUNTER_TURSO_AUTH_TOKEN: ""

  # ── NATS (Event Publication) ──────────────────────────────
  COUNTER_NATS_URL: "nats://nats-dev:4222"
  COUNTER_NATS_SUBJECT_PREFIX: "counter"
