# Web BFF — Dev Secrets Template
#
# This is a TEMPLATE file. DO NOT commit unencrypted.
# Encrypt with: sops --encrypt <this-file> > infra/security/sops/dev/web-bff.enc.yaml
#
# Edit encrypted version with: just sops-edit web-bff dev

apiVersion: v1
kind: Secret
metadata:
  name: web-bff-secrets
  namespace: app-dev
  labels:
    app.kubernetes.io/name: web-bff
    app.kubernetes.io/env: dev
type: Opaque
stringData:
  # ── Server ─────────────────────────────────────────────────
  APP_SERVER_HOST: "0.0.0.0"
  APP_SERVER_PORT: "3010"
  APP_RUST_LOG: "debug,web-bff=trace"

  # ── JWT Authentication ─────────────────────────────────────
  APP_JWT_SECRET: "dev-jwt-secret-change-me"

  # ── CORS ───────────────────────────────────────────────────
  APP_CORS_ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"

  # ── Database (Embedded Turso for Phase 0) ─────────────────
  APP_DATABASE_URL: "file:/data/web-bff.db"

  # ── Turso Remote (optional, for Phase 1+) ─────────────────
  # APP_TURSO_URL: ""
  # APP_TURSO_AUTH_TOKEN: ""
