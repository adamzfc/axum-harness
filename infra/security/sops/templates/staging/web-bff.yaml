# Web BFF — Staging Secrets Template
#
# This is a TEMPLATE file. DO NOT commit unencrypted.
# Encrypt with: sops --encrypt <this-file> > infra/security/sops/staging/web-bff.enc.yaml

apiVersion: v1
kind: Secret
metadata:
  name: web-bff-secrets
  namespace: app-staging
  labels:
    app.kubernetes.io/name: web-bff
    app.kubernetes.io/env: staging
type: Opaque
stringData:
  # ── Server ─────────────────────────────────────────────────
  SERVER_HOST: "0.0.0.0"
  SERVER_PORT: "3010"
  RUST_LOG: "info,web-bff=info"

  # ── JWT Authentication ─────────────────────────────────────
  JWT_SECRET: "staging-jwt-secret-REPLACE"

  # ── CORS ───────────────────────────────────────────────────
  CORS_ALLOWED_ORIGINS: "https://staging.example.com"

  # ── Database (Remote Turso for staging) ───────────────────
  DATABASE_URL: "libsql://staging-counter-db.turso.io"
  TURSO_AUTH_TOKEN: "REPLACE_WITH_TURSO_TOKEN"

  # ── Cache (Valkey) ────────────────────────────────────────
  VALKEY_URL: "redis://valkey-staging:6379"

  # ── NATS ──────────────────────────────────────────────────
  NATS_URL: "nats://nats-staging:4222"
