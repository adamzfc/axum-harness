# Outbox Relay Worker — Staging Secrets Template
#
# This is a TEMPLATE file. DO NOT commit unencrypted.
# Encrypt with: sops --encrypt <this-file> > infra/security/sops/staging/outbox-relay-worker.enc.yaml

apiVersion: v1
kind: Secret
metadata:
  name: outbox-relay-worker-secrets
  namespace: app-staging
  labels:
    app.kubernetes.io/name: outbox-relay-worker
    app.kubernetes.io/env: staging
type: Opaque
stringData:
  # ── Worker ─────────────────────────────────────────────────
  RUST_LOG: "info"

  # ── Database ──────────────────────────────────────────────
  DATABASE_URL: "libsql://staging-counter-db.turso.io"
  TURSO_AUTH_TOKEN: "REPLACE_WITH_TURSO_TOKEN"

  # ── NATS ──────────────────────────────────────────────────
  NATS_URL: "nats://nats-staging:4222"
  NATS_SUBJECT_PREFIX: "counter"

  # ── Outbox Relay Config ───────────────────────────────────
  OUTBOX_POLL_INTERVAL_MS: "500"
  OUTBOX_BATCH_SIZE: "100"

  # ── Checkpoint ────────────────────────────────────────────
  CHECKPOINT_PATH: "/data/outbox-relay-checkpoint.json"
