# RBAC Configuration
#
# Role-Based Access Control for application workloads.
# Follows least-privilege principle.

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-workload-role
  namespace: app
  labels:
    managed-by: flux
rules:
  # Allow reading configmaps (for application config)
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  # Allow reading secrets (for database credentials, API keys)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  # Allow leader election for HA workers
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-workload-rolebinding
  namespace: app
  labels:
    managed-by: flux
subjects:
  - kind: ServiceAccount
    name: app-workload
    namespace: app
roleRef:
  kind: Role
  name: app-workload-role
  apiGroup: rbac.authorization.k8s.io
