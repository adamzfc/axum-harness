# Flux Application Definition — Admin BFF
#
# This Kustomization manages the Admin BFF (Backend-For-Frontend) deployment.
# Handles admin and platform management APIs.
# Flux will automatically apply changes when this file is updated in Git.

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: admin-bff
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./infra/kubernetes/rendered/admin-bff
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m0s
  wait: true
  retryInterval: 2m0s
  maxRetries: 3

  # Decryption of SOPS-encrypted secrets
  decryption:
    provider: sops
    secretRef:
      name: sops-age

  # Health checks to verify deployment succeeded
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: admin-bff
      namespace: app

  # Dependencies
  dependsOn:
    - name: infrastructure
      namespace: flux-system
    - name: api
      namespace: flux-system

  # Post-build variable substitution
  postBuild:
    substitute:
      ENV: dev
      REPLICA_COUNT: "1"
      LOG_LEVEL: debug

  # Target namespace
  targetNamespace: app
