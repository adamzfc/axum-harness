name: tenant-onboarding
version: 1.0.0
description: >
  Durable workflow for onboarding a new tenant. Creates the tenant record,
  provisions tenant-scoped resources, and emits a completion event.
  Designed as the reference multi-step workflow with
  checkpointing and compensation.

trigger:
  type: command
  ref: create-tenant

idempotency_key: tenant_id
timeout: PT2M
checkpoint_policy: per-step
retry_policy: retry.default

steps:
  - name: create-tenant-record
    action: tenant-service/create_tenant
    idempotency_key: tenant_id
    timeout: PT10S
    max_retries: 3
    checkpoint: true
    on_success:
      - provision-resources

  - name: provision-resources
    action: tenant-service/provision_tenant_resources
    idempotency_key: tenant_id
    timeout: PT30S
    max_retries: 5
    checkpoint: true
    depends_on:
      - create-tenant-record
    compensation_ref: compensate-resources
    on_success:
      - publish-completed

  - name: publish-completed
    action: packages/messaging/publish
    idempotency_key: tenant_id + completed
    timeout: PT10S
    max_retries: 3
    checkpoint: true
    parameters:
      event: tenant-created
    depends_on:
      - provision-resources

compensation:
  - for_step: provision-resources
    action: tenant-service/deprovision_tenant_resources
    idempotency_key: tenant_id + compensate-resources

recovery:
  resume_from: last_checkpoint
  operator_intervention_on: exhausted_retries
  data_risk: moderate
