name: passwordless-login
version: 1.0.0
description: >
  Passwordless authentication flow using magic links or OTP.
  Generates one-time token, sends to user's email, validates
  on return, and establishes session.

trigger:
  type: command
  ref: start-login

idempotency_key: provider + recipient + request_nonce
timeout: PT5M
checkpoint_policy: per-step
retry_policy: retry.short

steps:
  - name: generate_token
    action: auth-service/generate_magic_link_token
    idempotency_key: provider + recipient + request_nonce + token
    timeout: PT10S
    max_retries: 2
    checkpoint: true
    on_success:
      - send_email

  - name: send_email
    action: packages/messaging/publish
    idempotency_key: provider + recipient + request_nonce + email
    timeout: PT30S
    max_retries: 3
    checkpoint: true
    parameters:
      event: MagicLinkRequested
    depends_on:
      - generate_token
    compensation_ref: expire-generated-token

compensation:
  - for_step: send_email
    action: auth-service/expire_magic_link_token
    idempotency_key: provider + recipient + request_nonce + expire

recovery:
  resume_from: last_checkpoint
  operator_intervention_on: exhausted_retries
  data_risk: low
