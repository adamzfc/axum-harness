name: invite-member
version: 1.0.0
description: >
  Durable workflow for inviting a new member into a tenant.
  Validates permission, creates invitation state, and emits the invitation event.
  Serves as the compact reference workflow for command-driven tenant mutation.

trigger:
  type: command
  ref: invite-member

idempotency_key: tenant_id + invitee_email
timeout: PT1M
checkpoint_policy: per-step
retry_policy: retry.default

steps:
  - name: validate-permissions
    action: tenant-service/validate_invite_permission
    idempotency_key: tenant_id + invitee_email + validate
    timeout: PT10S
    max_retries: 2
    checkpoint: true
    on_success:
      - create-invitation

  - name: create-invitation
    action: tenant-service/create_member_invitation
    idempotency_key: tenant_id + invitee_email
    timeout: PT10S
    max_retries: 3
    checkpoint: true
    depends_on:
      - validate-permissions
    compensation_ref: revoke-invitation
    on_success:
      - publish-member-invited

  - name: publish-member-invited
    action: packages/messaging/publish
    idempotency_key: tenant_id + invitee_email + published
    timeout: PT10S
    max_retries: 3
    checkpoint: true
    parameters:
      event: member-invited
    depends_on:
      - create-invitation

compensation:
  - for_step: create-invitation
    action: tenant-service/revoke_member_invitation
    idempotency_key: tenant_id + invitee_email + revoke

recovery:
  resume_from: last_checkpoint
  operator_intervention_on: exhausted_retries
  data_risk: low
