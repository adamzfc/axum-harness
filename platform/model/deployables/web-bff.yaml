name: web-bff
type: bff
version: 1.0.0
description: >
  Backend-for-Frontend for the web application (SvelteKit).
  Aggregates service APIs into view-optimized endpoints,
  handles server-side rendering data fetching, and manages
  web-specific auth/session concerns.

services:
  - counter
  - user
  - tenant
  - settings
  - agent
  - chat
  - auth

resources:
  - cache

entry_point: servers/bff/web-bff/src/main.rs
package: web-bff

health_check:
  path: /healthz
  port: 3010
  interval_seconds: 10

ports:
  - 3010

observability:
  health_check:
    endpoint: /healthz
    interval: 10s
  readiness_check:
    endpoint: /readyz
    interval: 10s
