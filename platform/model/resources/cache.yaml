name: cache
type: cache
description: >
  In-memory cache layer for frequently accessed data.
  Supports multiple backends (Moka for in-process, Valkey/Dragonfly
  for distributed). Used for session data and hot paths.

technology: moka/valkey
version: "0.12"

adapters:
  - packages/adapters/cache

local_dev:
  env_vars:
    CACHE_BACKEND: "moka"
    CACHE_TTL_SECONDS: "300"

encryption:
  at_rest: true
  in_transit: true

access_control:
  rbac: true
  abac: false

required_by:
  - web-bff
