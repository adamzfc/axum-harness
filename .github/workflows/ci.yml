name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ============================================
  # Rust: Lint, Build, Test
  # ============================================
  rust-ci:
    name: Rust CI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # Windows excluded for faster PR cycle; Tauri deps complex on Windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Rust fmt check
        run: cargo fmt --all -- --check

      - name: Rust clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Rust check
        run: cargo check --workspace --exclude desktop-ui-tauri

      - name: Rust test
        run: cargo test --workspace --exclude desktop-ui-tauri -- --test-threads=4

  # ============================================
  # Frontend: Lint, Type Check, Build
  # ============================================
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install frontend deps
        working-directory: apps/web
        run: bun install --frozen-lockfile

      - name: Frontend type check
        working-directory: apps/web
        run: bun run check

      - name: Frontend lint
        working-directory: apps/web
        run: bun run lint

      - name: Frontend unit tests
        working-directory: apps/web
        run: bun run test:unit || true

      - name: Frontend build
        working-directory: apps/web
        run: bun run build

      - name: Tauri crate build verification
        run: cargo build --manifest-path apps/desktop/src-tauri/Cargo.toml

  # ============================================
  # Platform Validation (only if platform files changed)
  # ============================================
  platform-validation:
    name: Platform Validation
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && (
        contains(github.event.pull_request.labels.*.name, 'platform-change') ||
        github.event.pull_request.title == 'auto: platform-change'
      ))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Validate platform models
        run: cargo run --bin platform-validator -- --platform-dir platform || echo "⚠️ platform-validator skipped (not ready)"

      - name: Validate dependency graph
        run: cargo run --bin dependency-validator -- --platform-dir platform || echo "⚠️ dependency-validator skipped (not ready)"

      - name: Check contract drift
        run: cargo run --bin contract-drift-detector -- --platform-dir platform || echo "⚠️ contract-drift-detector skipped (not ready)"

      - name: Generate platform catalog
        run: cargo run --bin platform-generator -- --platform-dir platform --output-dir platform/catalog || echo "⚠️ platform-generator skipped (not ready)"
