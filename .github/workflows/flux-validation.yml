name: Flux Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'infra/gitops/flux/**'
  push:
    branches: [main]
    paths:
      - 'infra/gitops/flux/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-flux:
    name: Validate Flux Manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Flux CLI
        uses: fluxcd/flux2/action@main

      - name: Check Flux manifests syntax
        run: |
          echo "Validating YAML syntax..."
          for file in $(find infra/gitops/flux -name '*.yaml'); do
            echo "Checking $file"
            python3 -c "import yaml; yaml.safe_load(open('$file'))" || exit 1
          done

      - name: Validate Kubernetes manifests
        run: |
          echo "Checking if kubectl is available for validation..."
          if command -v kubectl &> /dev/null; then
            kubectl apply --dry-run=client -f infra/gitops/flux/ 2>&1 || echo "⚠️  kubectl dry-run failed (expected without cluster)"
          else
            echo "⚠️  kubectl not available, skipping dry-run"
          fi

      - name: Check Flux source configuration
        run: |
          echo "Checking Flux configuration structure..."
          if [ -d "infra/gitops/flux/apps" ] && \
             [ -d "infra/gitops/flux/infrastructure" ] && \
             [ -d "infra/gitops/flux/policies" ]; then
            echo "✅ Flux directory structure is correct"
          else
            echo "❌ Flux directory structure is incorrect"
            exit 1
          fi

      - name: Verify all apps have required fields
        run: |
          echo "Checking app configurations..."
          for file in infra/gitops/flux/apps/*.yaml; do
            echo "Checking $file"
            grep -q "kind: Kustomization" "$file" || exit 1
            grep -q "apiVersion: kustomize.toolkit.fluxcd.io" "$file" || exit 1
            grep -q "spec:" "$file" || exit 1
          done
          echo "✅ All app configs are valid"

      - name: Verify all infrastructure components have required fields
        run: |
          echo "Checking infrastructure configurations..."
          for file in infra/gitops/flux/infrastructure/*.yaml; do
            echo "Checking $file"
            grep -q "kind:" "$file" || exit 1
            grep -q "apiVersion:" "$file" || exit 1
            grep -q "metadata:" "$file" || exit 1
          done
          echo "✅ All infrastructure configs are valid"
